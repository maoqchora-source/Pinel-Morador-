<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Morador - AbrangeBox</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; display: flex; height: 100vh; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; border: 1px solid #e2e8f0; }
        h1 { color: #3b82f6; font-size: 26px; text-align: center; margin-bottom: 5px; font-weight: 800; letter-spacing: -0.5px; }
        h1 span { color: #10b981; }
        p { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 30px; }
        label { font-weight: 600; display: block; margin-top: 15px; color: #1e293b; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 6px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; background-color: #f8fafc; transition: border 0.2s; }
        input:focus { border-color: #3b82f6; outline: none; background-color: white; }
        button { background-color: #3b82f6; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin-top: 30px; width: 100%; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2); }
        button:hover { background-color: #2563eb; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>ABRANGE<span>BOX</span></h1>
    <p>Área do Condômino - Consumo de Energia</p>
    
    <form action="/login_morador" method="POST">
        <label>ID de Acesso da Vaga:</label>
        <input type="number" name="id_hardware" placeholder="Ex: 3" required>
        
        <label>Senha:</label>
        <input type="password" name="senha" placeholder="Digite sua senha" required>
        
        <button type="submit">Entrar no Meu Painel</button>
    </form>
</div>

</body>
</html>
