<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Consumo - AbrangeBox</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #10b981; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 800; color: #0f172a; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .card h3 { font-size: 14px; color: #64748b; margin-bottom: 10px; }
        .card p { font-size: 24px; font-weight: 700; color: var(--text); }
        
        .chart-container { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard da Vaga: <span id="vaga-id">Carregando...</span></h1>
    </div>

    <div class="stats-grid">
        <div class="card"><h3>Consumo Total</h3><p id="total-kwh">0.00 kWh</p></div>
        <div class="card"><h3>Total de Registros</h3><p id="total-regs">0</p></div>
    </div>

    <div class="chart-container">
        <canvas id="grafico"></canvas>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const MINHA_VAGA = urlParams.get('vaga');
    document.getElementById('vaga-id').innerText = MINHA_VAGA ? MINHA_VAGA.toUpperCase() : "ERRO";

    const URL_GAS = 'https://script.google.com/macros/s/AKfycbzokzR3uzo9PYgTFbRcXWp1X9tVUX0uFKDDgfBvKj_I1Ip7_omTZ1pJFWVzXcqROlcbLg/exec';

    // Esta função será chamada pelo Google automaticamente
    function processarDados(dadosCompletos) {
        const historico = dadosCompletos.filter(item => 
            item.vaga.trim().toLowerCase() === MINHA_VAGA.toLowerCase()
        );
        renderizarGrafico(historico);
    }

    // Carrega os dados via JSONP (injetando uma tag script)
    function carregarDados() {
        const script = document.createElement('script');
        script.src = URL_GAS + '?callback=processarDados';
        document.body.appendChild(script);
    }

    function renderizarGrafico(historico) {
        const totalConsumo = historico.reduce((acc, curr) => acc + curr.consumo, 0);
        document.getElementById('total-kwh').innerText = totalConsumo.toFixed(2) + " kWh";
        document.getElementById('total-regs').innerText = historico.length;

        const ctx = document.getElementById('grafico').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: historico.map(item => item.data),
                datasets: [{
                    label: 'Consumo (kWh)',
                    data: historico.map(item => item.consumo),
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    carregarDados();
</script>
</body>
</html>
